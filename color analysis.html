<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colour Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ivory: #F8F4EE;
    --warm-stone: #E8E0D4;
    --bark: #9C8C7A;
    --deep: #2A2220;
    --accent: #C4956A;
    --accent-pale: #F0E6D8;
    --text: #2A2220;
    --muted: #7A6E66;
    --border: rgba(42,34,32,0.12);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--ivory);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    text-align: center;
    padding: 4rem 2rem 2rem;
    position: relative;
  }

  .eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1rem;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3rem, 6vw, 5.5rem);
    font-weight: 300;
    line-height: 1.05;
    letter-spacing: -0.01em;
    color: var(--deep);
  }

  h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .subtitle {
    margin-top: 1.25rem;
    font-size: 15px;
    color: var(--muted);
    font-weight: 300;
    max-width: 380px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.7;
  }

  .progress-bar {
    width: 100%;
    max-width: 560px;
    height: 2px;
    background: var(--warm-stone);
    margin: 2.5rem auto 0;
    position: relative;
    border-radius: 2px;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  .step-indicator {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 0.75rem;
    letter-spacing: 0.05em;
  }

  main {
    width: 100%;
    max-width: 560px;
    padding: 2rem 1.5rem 4rem;
  }

  .question-card {
    animation: fadeUp 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-number {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 0.6rem;
  }

  .q-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.6rem, 3.5vw, 2.2rem);
    font-weight: 400;
    line-height: 1.25;
    color: var(--deep);
    margin-bottom: 0.75rem;
  }

  .q-hint {
    font-size: 14px;
    color: var(--muted);
    font-weight: 300;
    line-height: 1.6;
    margin-bottom: 2.5rem;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 18px 20px;
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    background: white;
    transition: all 0.2s ease;
    text-align: left;
    width: 100%;
    position: relative;
    overflow: hidden;
  }

  .option::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent-pale);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .option:hover { border-color: var(--accent); }
  .option:hover::before { opacity: 0.5; }

  .option.selected {
    border-color: var(--accent);
    background: var(--accent-pale);
  }

  .option-swatch {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 1px;
    position: relative;
    z-index: 1;
  }

  .option-body {
    position: relative;
    z-index: 1;
  }

  .option-label {
    font-weight: 500;
    font-size: 15px;
    color: var(--deep);
    display: block;
    margin-bottom: 3px;
  }

  .option-desc {
    font-size: 13px;
    color: var(--muted);
    font-weight: 300;
    line-height: 1.5;
  }

  .radio-dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--bark);
    flex-shrink: 0;
    margin-top: 10px;
    margin-left: auto;
    position: relative;
    z-index: 1;
    transition: border-color 0.2s;
  }

  .option.selected .radio-dot {
    border-color: var(--accent);
    background: var(--accent);
    box-shadow: inset 0 0 0 3px white;
  }

  .btn-next {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 2rem;
    padding: 14px 32px;
    background: var(--deep);
    color: var(--ivory);
    border: none;
    border-radius: 100px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.2s ease;
    opacity: 0.4;
    pointer-events: none;
  }

  .btn-next.active {
    opacity: 1;
    pointer-events: all;
  }

  .btn-next:hover { background: #1a1614; transform: translateY(-1px); }
  .btn-next:active { transform: translateY(0); }

  .btn-next svg { transition: transform 0.2s; }
  .btn-next:hover svg { transform: translateX(3px); }

  /* Results */
  .results {
    animation: fadeUp 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  .season-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px 6px 8px;
    background: var(--accent-pale);
    border-radius: 100px;
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }

  .season-dot {
    width: 20px;
    height: 20px;
    border-radius: 50%;
  }

  .result-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.4rem, 5vw, 3.8rem);
    font-weight: 300;
    color: var(--deep);
    line-height: 1.1;
    margin-bottom: 0.5rem;
  }

  .result-title em { font-style: italic; color: var(--accent); }

  .result-desc {
    font-size: 15px;
    color: var(--muted);
    font-weight: 300;
    line-height: 1.75;
    margin-bottom: 2.5rem;
    max-width: 460px;
  }

  .palette-section {
    margin-bottom: 2.5rem;
  }

  .palette-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--bark);
    font-weight: 500;
    margin-bottom: 1rem;
  }

  .palette-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
  }

  .swatch-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .swatch {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 10px;
    border: 1px solid rgba(0,0,0,0.06);
    transition: transform 0.2s;
    cursor: default;
  }

  .swatch:hover { transform: scale(1.08); }

  .swatch-name {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    line-height: 1.3;
    font-weight: 400;
  }

  .avoid-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
  }

  .avoid-swatch {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 10px;
    border: 1px solid rgba(0,0,0,0.06);
    position: relative;
    overflow: hidden;
  }

  .avoid-swatch::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 45%, rgba(0,0,0,0.15) 45%, rgba(0,0,0,0.15) 55%, transparent 55%);
  }

  .tips-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem;
    margin-bottom: 2rem;
  }

  .tips-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 400;
    color: var(--deep);
    margin-bottom: 1rem;
  }

  .tip {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    margin-bottom: 0.75rem;
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
    font-weight: 300;
  }

  .tip-icon {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--accent-pale);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
  }

  .tip-icon svg { width: 10px; height: 10px; }

  .btn-restart {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 28px;
    border: 1px solid var(--border);
    border-radius: 100px;
    background: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 400;
  }

  .btn-restart:hover { border-color: var(--bark); color: var(--deep); }

  @media (max-width: 480px) {
    .palette-grid, .avoid-grid { grid-template-columns: repeat(4, 1fr); }
    h1 { font-size: 2.8rem; }
  }
</style>
</head>

    tips: [

    tips: [

      'Pure white and icy pastels bring out your natural cool luminosity.',
      'Avoid anything warm, golden, or earthy — it will make you look sallow.',

  },
  'true winter': {
    emoji: '🌨️',
    tagline: 'Cool, deep, and powerful',
    desc: 'You are defined by cool depth and natural drama. Your palette is cool and saturated — deep navy, charcoal, jewel-toned emerald, magenta, and pure white that channel your commanding natural presence.',
    colors: [
      { hex: '#0D1B3E', name: 'Deep navy' },
      { hex: '#2D3A3A', name: 'Charcoal' },
      { hex: '#1A5C3A', name: 'Jewel emerald' },
      { hex: '#B42060', name: 'Magenta' },
      { hex: '#5C3A8A', name: 'Deep violet' },
      { hex: '#E8E8F0', name: 'Cool white' },

let answers = {};
let current = 0;

function getSeasonKey() {
  const u = answers.undertone;
  const c = answers.contrast;
  const d = answers.depth;
  const key = `${u}_${c}_${d}`;
  return seasons[key] || 'true summer';
}

function renderQuestion() {
  const q = questions[current];
  const pct = (current / 3) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('stepIndicator').textContent = `Question ${current + 1} of 3`;

  const selected = answers[q.id];
  document.getElementById('main').innerHTML = `
    <div class="question-card">
      <p class="q-number">${q.number}</p>
      <h2 class="q-text">${q.text}</h2>
      <p class="q-hint">${q.hint}</p>
      <div class="options" id="options">
        ${q.options.map(opt => `
          <button class="option ${selected === opt.value ? 'selected' : ''}" onclick="select('${q.id}', '${opt.value}')">
            <div class="option-swatch" style="background:${opt.swatch}"></div>
            <div class="option-body">
              <span class="option-label">${opt.label}</span>
              <span class="option-desc">${opt.desc}</span>
            </div>
            <div class="radio-dot"></div>
          </button>
        `).join('')}
      </div>
      <button class="btn-next ${selected ? 'active' : ''}" id="btnNext" onclick="next()">
        ${current < 2 ? 'Next question' : 'See my palette'}
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  `;
}

function select(id, value) {
  answers[id] = value;
  document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  document.getElementById('btnNext').classList.add('active');
}

function next() {
  if (!answers[questions[current].id]) return;
  current++;
  if (current >= 3) {
    renderResults();
  } else {
    renderQuestion();
  }
}

function renderResults() {
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('stepIndicator').textContent = 'Your results';

  const seasonKey = getSeasonKey();
  const data = paletteData[seasonKey] || paletteData['true summer'];
  const seasonName = seasonKey.charAt(0).toUpperCase() + seasonKey.slice(1);

  document.getElementById('main').innerHTML = `
    <div class="results">
      <div class="season-badge">
        <div class="season-dot" style="background:${data.colors[0].hex}"></div>
        Your season
      </div>
      <h2 class="result-title">You are a<br><em>${seasonName}</em></h2>
      <p class="result-desc">${data.desc}</p>

      <div class="palette-section">
        <p class="palette-label">Your signature colours</p>
        <div class="palette-grid">
          ${data.colors.map(c => `
            <div class="swatch-wrap">
              <div class="swatch" style="background:${c.hex}" title="${c.name}"></div>
              <span class="swatch-name">${c.name}</span>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="palette-section">
        <p class="palette-label">Colours to avoid near your face</p>
        <div class="avoid-grid">
          ${data.avoid.map(hex => `
            <div class="avoid-swatch" style="background:${hex}" title="Avoid"></div>
          `).join('')}
        </div>
      </div>

      <div class="tips-card">
        <p class="tips-title">Styling tips for your season</p>
        ${data.tips.map(tip => `
          <div class="tip">
            <div class="tip-icon">
              <svg viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 5l2 2 4-4" stroke="#C4956A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span>${tip}</span>
          </div>
        `).join('')}
      </div>

      <button class="btn-restart" onclick="restart()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M1 7a6 6 0 1 1 1.5 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          <path d="M1 11V7h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Start again
      </button>
    </div>
  `;
}

function restart() {
  answers = {};
  current = 0;
  renderQuestion();
}

renderQuestion();
</script>
